name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: npm install -g npm@latest
      - run: pnpm install
      - run: pnpm build

      - name: Determine npm tag
        id: npm-tag
        run: |
          if echo "${{ inputs.tag_name }}" | grep -q "alpha"; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug OIDC environment
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "OIDC URL set: $(if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then echo YES; else echo NO; fi)"
          echo "OIDC token set: $(if [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then echo YES; else echo NO; fi)"
          echo "NPM_CONFIG_USERCONFIG: ${NPM_CONFIG_USERCONFIG:-not set}"
          echo "NODE_AUTH_TOKEN set: $(if [ -n "$NODE_AUTH_TOKEN" ]; then echo YES; else echo NO; fi)"
          npm config list

      - run: npm publish --tag ${{ steps.npm-tag.outputs.tag }} --access public --provenance
