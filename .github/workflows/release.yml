name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install
      - run: pnpm build

      - name: Determine npm tag
        id: npm-tag
        run: |
          if echo "${{ inputs.tag_name }}" | grep -q "alpha"; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint OIDC token for npm
        run: |
          response=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.npmjs.org")
          token=$(echo "$response" | jq -r '.value')
          echo "::add-mask::$token"
          echo "NODE_AUTH_TOKEN=$token" >> "$GITHUB_ENV"

      - run: pnpm publish --tag ${{ steps.npm-tag.outputs.tag }} --access public --provenance --no-git-checks
